# More option see https://github.com/DreamMaoMao/mango/wiki/

# Monitor
#monitorrule=name:DP-1,width:2560,height:1440,refresh:180,x:0,y:0,scale:1

# Cursor
#cursor_theme = hicolor
#cursor_size = 24
#env = XCURSOR_THEME,hicolor
#env = XCURSOR_SIZE,24

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 3
blur_params_noise = 0
blur_params_brightness = 1
blur_params_contrast = 1
blur_params_saturation = 1

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0

border_radius=10
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animations
animations=1
animation_type_open=zoom
animation_duration_open=750
animation_curve_open=0,0,0,1
animation_type_close=zoom
animation_duration_close=750
animation_curve_close=0,0,0,1

animation_fade_in=1
animation_fade_out=1

zoom_end_ratio=0.00
zoom_initial_ratio=0.00

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
drag_tile_to_tile=1
drag_tile_small=1

# Keyboard
repeat_rate=30
repeat_delay=450
numlockon=1
xkb_rules_layout=de

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4
dropcolor=0x433551ff
splitcolor=0xEB441EFF
shadowscolor = 0x282a36ff
rootcolor = 0x282a36ff
bordercolor = 0x6d7290ff
focuscolor = 0xFFFFFFff
maximizescreencolor = 0xff79c6ff
urgentcolor = 0xff5555ff
scratchpadcolor = 0x8be9fdff
globalcolor = 0x5a00d9ff
overlaycolor = 0xc60071ff

# layout support:
# tile, scroller, grid, deck, monocle, center_tile, vertical_tile, right_tile, vertical_scroller, vertical_grid, vertical_deck, dwindle, fair, vertical_fair, master-stack, tgmix

tagrule=id:1,layout_name:fair
tagrule=id:2,layout_name:fair
tagrule=id:3,layout_name:fair
tagrule=id:4,layout_name:fair
tagrule=id:5,layout_name:fair
tagrule=id:6,layout_name:fair
tagrule=id:7,layout_name:fair
tagrule=id:8,layout_name:fair
tagrule=id:9,layout_name:fair

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,L,reload_config

# Apps
bind=SUPER,space,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun -show-icons
bind=SUPER,R,spawn,ghostty
bind=SUPER,W,spawn,zen-browser
bind=SUPER,E,spawn,thunar
bind=SUPER,C,spawn,code

# exit
bind=SUPER,m,quit
bind=SUPER,Q,killclient,

# switch window focus
bind=ALT,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER,Tab,toggleoverview,
bind=SUPER,d,togglefloating,
bind=SUPER,f,togglefullscreen,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER,Return,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Left,tagtoleft,0
bind=CTRL,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0
bind=Alt,6,tag,6,0
bind=Alt,7,tag,7,0
bind=Alt,8,tag,8,0
bind=Alt,9,tag,9,0
# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft
axisbind=SUPER,DOWN,viewtoright

axisbind=CTRL,UP,tagtoleft
axisbind=CTRL,DOWN,tagtoright

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
layerrule=layer_name:rofi,animation_type_open:zoom,animation_type_close:fade

# windowrule
windowrule=isfloating:1,isnoshadow:1,ignore_maximize:1,ignore_minimize:1,width:480,height:270,title:Picture-in-Picture
windowrule=offsetx:0,offsety:0,isfloating:1,appid:waypaper
windowrule=isfloating:1,width:400,height:400,appid:gnome-calculator
windowrule=isfloating:1,width:800,height:600,appid:nwg-look
windowrule=isfloating:1,width:900,height:600,title:nmtui
windowrule=isfloating:1,width:900,height:600,appid:nm-connection-editor
windowrule=isfloating:1,width:700,height:500,appid:blueman-manager
windowrule=isfloating:1,width:900,height:700,appid:pavucontrol
windowrule=isfloating:1,width:900,height:600,title:Rename,appid:thunar
windowrule=isfloating:1,width:900,height:600,title:Extract,appid:org.gnome.FileRoller
windowrule=isfloating:1,appid:thunar,title:Confirm to replace files
windowrule=isfloating:1,appid:thunar,title:File Operation Progress

### autostart ###
exec-once = bash ~/.config/mango/autostart.sh
